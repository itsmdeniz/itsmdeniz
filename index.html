<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Deniz Sayaç</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1d2433 0%, #0b0f17 55%, #05070b 100%);
      color: #f7f4ef;
      padding: 24px;
    }

    main {
      width: min(680px, 100%);
      padding: 36px 28px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.07);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      text-align: center;
      backdrop-filter: blur(18px);
    }

    .eyebrow {
      margin: 0 0 10px;
      color: #f3b78d;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 0.78rem;
    }

    h1 {
      margin: 0 0 22px;
      font-size: clamp(2rem, 7vw, 4rem);
      line-height: 1;
    }

    #countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: 26px 0;
    }

    .unit {
      padding: 18px 10px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .value {
      display: block;
      font-size: clamp(2rem, 9vw, 4.2rem);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .label {
      display: block;
      margin-top: 6px;
      color: rgba(247, 244, 239, 0.72);
      font-size: 0.85rem;
    }

    #message {
      min-height: 1.5em;
      margin: 18px 0 0;
      color: rgba(247, 244, 239, 0.82);
      font-size: 1.05rem;
    }

    .target {
      margin: 16px 0 0;
      color: rgba(247, 244, 239, 0.62);
      font-size: 0.95rem;
    }

    @media (max-width: 520px) {
      #countdown {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Deniz için sayaç</p>
    <h1>20:25'e kalan süre</h1>

    <section id="countdown" aria-live="polite">
      <div class="unit"><span class="value" id="days">00</span><span class="label">Gün</span></div>
      <div class="unit"><span class="value" id="hours">00</span><span class="label">Saat</span></div>
      <div class="unit"><span class="value" id="minutes">00</span><span class="label">Dakika</span></div>
      <div class="unit"><span class="value" id="seconds">00</span><span class="label">Saniye</span></div>
    </section>

    <p id="message">Sayaç çalışıyor ⏱️</p>
    <p class="target">Bitiş: 21 Haziran 2026, 20:25 · İstanbul saati</p>
  </main>

  <script>
    const target = new Date("2026-06-21T20:25:00+03:00").getTime();

    const els = {
      days: document.getElementById("days"),
      hours: document.getElementById("hours"),
      minutes: document.getElementById("minutes"),
      seconds: document.getElementById("seconds"),
      message: document.getElementById("message")
    };

    function pad(number) {
      return String(number).padStart(2, "0");
    }

    function updateCountdown() {
      const now = Date.now();
      const diff = target - now;

      if (diff <= 0) {
        els.days.textContent = "00";
        els.hours.textContent = "00";
        els.minutes.textContent = "00";
        els.seconds.textContent = "00";
        els.message.textContent = "Süre doldu. Bitti reis ✅";
        document.title = "Sayaç bitti";
        clearInterval(timer);
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      els.days.textContent = pad(days);
      els.hours.textContent = pad(hours);
      els.minutes.textContent = pad(minutes);
      els.seconds.textContent = pad(seconds);
      document.title = `${pad(hours)}:${pad(minutes)}:${pad(seconds)} kaldı`;
    }

    updateCountdown();
    const timer = setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
